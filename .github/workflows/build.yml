name: Build kernel

on:
  push:
  pull_request:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-multilib binutils make
      - name: Build Cyralith kernel
        run: |
          cd kernel
          make clean
          make all
